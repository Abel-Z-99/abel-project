services:
  redis:
    image: redis:7-alpine
    container_name: webshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: webshop-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd123}
    ports:
      # 本机 1433 在部分 Windows 环境可能被系统保留，改用 11433 暴露到宿主机
      - "11433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  webapi:
    build:
      context: .
      dockerfile: WebApi/Dockerfile
    container_name: webshop-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mssql;Database=ShopMaster;User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd123};TrustServerCertificate=True;Encrypt=False;
      Redis__ConnectionString: redis:6379
      Redis__DashboardSummaryTtlSeconds: "30"
      Seed__Enabled: "true"
    depends_on:
      redis:
        condition: service_started
      mssql:
        condition: service_healthy
    ports:
      - "5000:8080"
    volumes:
      - uploads-data:/app/wwwroot/uploads

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: webshop-admin-web
    depends_on:
      - webapi
    ports:
      - "5173:80"

volumes:
  redis-data:
  mssql-data:
  uploads-data:
