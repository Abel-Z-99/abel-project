name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WebShop.sln

      - name: Build
        run: dotnet build WebShop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WebShop.sln --configuration Release --no-build

  admin-web:
    name: Admin Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
