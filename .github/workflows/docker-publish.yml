name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches: [main]

# 避免并发推送导致部署交错
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: webapi
            dockerfile: ./WebApi/Dockerfile
            context: .
          - image: admin-web
            dockerfile: ./admin-web/Dockerfile
            context: ./admin-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/webshop-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 阿里云 ECS：SSH 到服务器执行 docker compose pull/up。
  # 前置：ECS 已安装 Docker / Compose；部署目录含本仓库的 docker-compose.aliyun.yml 与 .env（含 SA_PASSWORD 等）。
  # Secrets（在「Secrets」页添加，不是 Variables）：ALIYUN_HOST、ALIYUN_USER、ALIYUN_SSH_KEY、ALIYUN_DEPLOY_PATH；
  #          若 GHCR 包为私有：GHCR_PULL_TOKEN（read:packages），可选 GHCR_USERNAME（与 PAT 所属账号一致，不设则用 github.actor）。
  deploy-aliyun:
    name: Deploy to Aliyun ECS
    needs: publish
    if: >
      needs.publish.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 计算 GHCR 镜像名（小写 owner）
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "WEBAPI_IMAGE=ghcr.io/${owner}/webshop-webapi:latest" >> $GITHUB_ENV
          echo "ADMIN_WEB_IMAGE=ghcr.io/${owner}/webshop-admin-web:latest" >> $GITHUB_ENV

      - name: SSH 登录 ECS 并更新容器
        uses: appleboy/ssh-action@v1.2.0
        env:
          WEBAPI_IMAGE: ${{ env.WEBAPI_IMAGE }}
          ADMIN_WEB_IMAGE: ${{ env.ADMIN_WEB_IMAGE }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          envs: WEBAPI_IMAGE,ADMIN_WEB_IMAGE,GHCR_TOKEN,GHCR_USER,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            GHCR_LOGIN_USER="${GHCR_USER:-${{ github.actor }}}"
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_LOGIN_USER" --password-stdin
            fi
            export WEBAPI_IMAGE ADMIN_WEB_IMAGE
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available on target host."
              exit 1
            fi
            echo "Using compose command: $COMPOSE_CMD"
            # 仅滚动更新应用容器，避免旧版 docker-compose(v1) 在重建 mssql/redis 时触发 ContainerConfig 兼容问题。
            $COMPOSE_CMD -f docker-compose.aliyun.yml pull webapi admin-web
            if ! $COMPOSE_CMD -f docker-compose.aliyun.yml up -d --no-deps --force-recreate webapi admin-web; then
              if [ "$COMPOSE_CMD" = "docker-compose" ]; then
                echo "Rolling update failed on docker-compose v1, removing app services and retry..."
                $COMPOSE_CMD -f docker-compose.aliyun.yml rm -sf webapi admin-web || true
                $COMPOSE_CMD -f docker-compose.aliyun.yml up -d --no-deps --force-recreate webapi admin-web
              else
                exit 1
              fi
            fi
