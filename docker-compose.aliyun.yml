# 阿里云 ECS 等环境：使用 CI 构建并推送到 GHCR 的镜像（不在服务器上 build）。
# 部署目录内需有 .env（至少 SA_PASSWORD），并在部署时设置 WEBAPI_IMAGE、ADMIN_WEB_IMAGE。
services:
  redis:
    image: m.daocloud.io/docker.io/redis:7-alpine
    container_name: webshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: webshop-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd123}
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  webapi:
    image: ${WEBAPI_IMAGE}
    container_name: webshop-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mssql;Database=ShopMaster;User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd123};TrustServerCertificate=True;Encrypt=False;
      Redis__ConnectionString: redis:6379
      Redis__DashboardSummaryTtlSeconds: ${REDIS_DASHBOARD_TTL_SECONDS:-30}
      Seed__Enabled: ${SEED__ENABLED:-true}
    depends_on:
      redis:
        condition: service_started
      mssql:
        condition: service_healthy
    ports:
      - "5000:8080"
    volumes:
      - uploads-data:/app/wwwroot/uploads

  admin-web:
    image: ${ADMIN_WEB_IMAGE}
    container_name: webshop-admin-web
    depends_on:
      - webapi
    ports:
      - "5173:80"

volumes:
  redis-data:
  mssql-data:
  uploads-data:
